apiVersion: v1
kind: ConfigMap
metadata:
  name: playwright-c8oforms-benchmarks
data:
  BASE_URL: "https://replace-me.example/convertigo/projects/C8Oforms/DisplayObjects/mobile/"
  CI: "true"
  WORKERS: "1"
  RETRIES: "0"
  REPEAT_EACH: "1"
  PLAYWRIGHT_TIMEOUT_MS: "60000"
  PLAYWRIGHT_TEST_TIMEOUT_MS: "180000"
  PLAYWRIGHT_HTML_OPEN: "never"
  PLAYWRIGHT_HTML_OUTPUT_DIR: "/tmp/playwright-report"
  PLAYWRIGHT_ARTIFACTS_DIR: "/tmp/playwright-results"
